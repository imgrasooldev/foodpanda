services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: foodrush-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: foodrush
      POSTGRES_PASSWORD: foodrush
      POSTGRES_DB: foodrush
    ports:
      - "5432:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodrush"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: foodrush-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./.docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
